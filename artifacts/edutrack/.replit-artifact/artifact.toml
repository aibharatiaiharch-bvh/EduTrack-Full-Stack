kind = "web"
previewPath = "/"
title = "EduTrack"
version = "1.0.0"
id = "artifacts/edutrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20369

[services.development]
run = "pnpm --filter @workspace/edutrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edutrack", "run", "build" ]
publicDir = "artifacts/edutrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20369"
BASE_PATH = "/"
